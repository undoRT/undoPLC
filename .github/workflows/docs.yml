name: Docs — Generate & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'include/**'
      - 'src/**'
      - 'README.md'
      - 'Doxyfile'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

env:
  DOCS_DIR: docs/html

jobs:
  doxygen:
    name: Build & Deploy Doxygen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout undoPLC
        uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            doxygen \
            graphviz

      - name: Generate Doxygen HTML
        run: doxygen Doxyfile 2>&1 | tee doxygen.log
        continue-on-error: true

      - name: Check for Doxygen warnings
        run: |
          if grep -q -i "warning" doxygen.log; then
            echo "::warning::Doxygen produced warnings — check the log"
            grep -i "warning" doxygen.log | head -20
          fi

      - name: Add version info
        run: |
          mkdir -p ${{ env.DOCS_DIR }}
          echo "Version: ${{ github.sha }}" > ${{ env.DOCS_DIR }}/version.txt
          echo "Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> ${{ env.DOCS_DIR }}/version.txt

      - name: Verify output
        run: |
          if [ ! -f ${{ env.DOCS_DIR }}/index.html ]; then
            echo "::error::Doxygen did not produce ${{ env.DOCS_DIR }}/index.html"
            exit 1
          fi
          echo "Doxygen output: $(ls ${{ env.DOCS_DIR }} | wc -l) files"

      - name: Checkout undort.github.io
        uses: actions/checkout@v4
        with:
          repository: undoRT/undort.github.io
          token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          path: gh-pages

      - name: Copy docs into undoPLC/api/
        run: |
          rm -rf gh-pages/undoPLC/api
          mkdir -p gh-pages/undoPLC/api
          cp -r ${{ env.DOCS_DIR }}/. gh-pages/undoPLC/api/
          echo "Copied files: $(ls gh-pages/undoPLC/api/ | wc -l) files"

      - name: Commit and push to undort.github.io
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add undoPLC/api/

          if git diff --cached --quiet; then
            echo "No changes to API docs — skipping commit."
          else
            COMMIT_SHA="${{ github.sha }}"
            git commit -m "docs(undoPLC): update API reference from ${COMMIT_SHA:0:7}"
            git push
            echo "✅ Docs deployed to https://undort.com/undoPLC/api/"
          fi